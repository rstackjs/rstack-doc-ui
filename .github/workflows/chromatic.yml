# Chromatic Visual Regression Testing
# https://www.chromatic.com/docs/github-actions/

name: Chromatic

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Pnpm
        run: npm install -g corepack@latest --force && corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.15.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build Storybook
        run: pnpm run build-storybook

      - name: Run Chromatic
        uses: chromaui/action@cad40970f69e7a6a5bef4ddfe42c01309ba17cb1 # latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # Use the pre-built Storybook
          storybookBuildDir: storybook-static
          # Auto accept changes on main branch (for squash/rebase merge)
          autoAcceptChanges: main
          # Don't fail CI when there are visual changes - require review in Chromatic UI
          exitZeroOnChanges: true
          # Skip builds for dependabot/renovate branches
          skip: '@(renovate/**|dependabot/**)'
