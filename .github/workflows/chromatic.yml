# Chromatic Visual Regression Testing
# https://www.chromatic.com/docs/github-actions/

name: Chromatic

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.18.0
          package-manager-cache: false

      - name: Install Pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: true

      - name: Build Packages
        run: pnpm build

      - name: Build Storybook
        run: pnpm run build-storybook

      - name: Run Chromatic
        uses: chromaui/action@cad40970f69e7a6a5bef4ddfe42c01309ba17cb1 # latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # Use the pre-built Storybook
          storybookBuildDir: storybook-static
          # Auto accept changes on main branch (for squash/rebase merge)
          autoAcceptChanges: main
          # Don't fail CI when there are visual changes - require review in Chromatic UI
          exitZeroOnChanges: true
          # Skip builds for dependabot/renovate branches
          skip: '@(renovate/**|dependabot/**)'
